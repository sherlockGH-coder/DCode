<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCode — Blueprint Design System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   DCODE · BLUEPRINT DESIGN SYSTEM
   Concept: Engineering Schematics as UI Language
   ═══════════════════════════════════════════════ */

:root {
  /* ── Core palette ── */
  --bp-deep: #0d1b2a;
  --bp-slate: #1b2838;
  --bp-surface: #152232;
  --bp-elevated: #1c2d40;
  --bp-grid-line: rgba(0, 200, 255, 0.06);
  --bp-grid-accent: rgba(0, 200, 255, 0.12);

  /* ── Cyan accent scale ── */
  --cyan-400: #22d3ee;
  --cyan-500: #06b6d4;
  --cyan-600: #0891b2;
  --cyan-glow: rgba(6, 182, 212, 0.20);
  --cyan-glow-strong: rgba(6, 182, 212, 0.35);

  /* ── Text ── */
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-tertiary: #64748b;
  --text-cyan: #67e8f9;

  /* ── Borders ── */
  --hairline: rgba(0, 200, 255, 0.10);
  --border: rgba(0, 200, 255, 0.16);
  --border-active: rgba(6, 182, 212, 0.50);

  /* ── Surfaces ── */
  --surface-input: #1a2d40;
  --surface-hover: rgba(0, 200, 255, 0.05);
  --surface-active: rgba(0, 200, 255, 0.08);

  /* ── Corners & spacing ── */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 14px;
  --radius-xl: 20px;

  /* ── Shadows ── */
  --shadow-glow: 0 0 30px var(--cyan-glow), 0 0 60px rgba(6, 182, 212, 0.06);
  --shadow-elevated: 0 4px 24px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(0, 200, 255, 0.08);

  /* ── Typography scale ── */
  --font-display: 'DM Sans', 'Noto Sans SC', sans-serif;
  --font-body: 'DM Sans', 'Noto Sans SC', sans-serif;
  --font-mono: 'DM Mono', 'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace;

  /* ── Animation ── */
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
  --duration-fast: 150ms;
  --duration-normal: 250ms;
  --duration-slow: 500ms;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bp-deep);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
}

/* ═══════════════════════════════════════════════
   BLUEPRINT GRID BACKGROUND
   ═══════════════════════════════════════════════ */

.blueprint-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.blueprint-grid {
  position: absolute;
  inset: 0;
  background-image:
    /* Major grid lines */
    linear-gradient(to right, var(--bp-grid-line) 1px, transparent 1px),
    linear-gradient(to bottom, var(--bp-grid-line) 1px, transparent 1px),
    /* Minor grid lines */
    linear-gradient(to right, rgba(0, 200, 255, 0.025) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(0, 200, 255, 0.025) 1px, transparent 1px);
  background-size:
    80px 80px,
    80px 80px,
    16px 16px,
    16px 16px;
}

/* Subtle radial vignette */
.blueprint-vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 40%, transparent 40%, var(--bp-deep) 85%);
}

/* Corner marks */
.blueprint-corners {
  position: absolute;
  inset: 32px;
  z-index: 1;
}
.blueprint-corners::before,
.blueprint-corners::after {
  content: '';
  position: absolute;
  width: 24px;
  height: 24px;
  border-color: var(--bp-grid-accent);
  border-style: solid;
}
.blueprint-corners::before {
  top: 0; left: 0;
  border-width: 1px 0 0 1px;
}
.blueprint-corners::after {
  bottom: 0; right: 0;
  border-width: 0 1px 1px 0;
}

/* ═══════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════ */

.app-shell {
  position: relative;
  z-index: 1;
  display: flex;
  height: 100vh;
  width: 100vw;
}

/* ── Sidebar (collapsed state shown) ── */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  background: var(--bp-slate);
  border-right: 1px solid var(--hairline);
  overflow: hidden;
}

.sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px;
  border-bottom: 1px solid var(--hairline);
}

.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar-logo {
  width: 28px;
  height: 28px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--cyan-500), #0ea5e9);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-weight: 500;
  font-size: 13px;
  color: #fff;
  letter-spacing: -0.5px;
}

.sidebar-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 15px;
  letter-spacing: -0.01em;
  color: var(--text-primary);
}

.sidebar-title span {
  font-weight: 300;
  color: var(--text-tertiary);
}

.sidebar-new-btn {
  width: 30px;
  height: 30px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--hairline);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--duration-fast) var(--ease-out-expo);
  font-size: 18px;
  line-height: 1;
}
.sidebar-new-btn:hover {
  background: var(--surface-hover);
  border-color: var(--border);
  color: var(--text-cyan);
}

.sidebar-conversations {
  flex: 1;
  overflow-y: auto;
  padding: 10px 10px;
}

.conv-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-out-expo);
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 2px;
}
.conv-item:hover {
  background: var(--surface-hover);
  color: var(--text-primary);
}
.conv-item.active {
  background: var(--surface-active);
  color: var(--text-cyan);
  border: 1px solid var(--hairline);
}
.conv-item .conv-icon {
  width: 18px;
  height: 18px;
  border-radius: 3px;
  background: var(--bp-elevated);
  border: 1px solid var(--hairline);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-tertiary);
}
.conv-item.active .conv-icon {
  border-color: var(--border);
  color: var(--text-cyan);
}

.sidebar-footer {
  padding: 12px 18px;
  border-top: 1px solid var(--hairline);
  display: flex;
  align-items: center;
  gap: 10px;
}
.sidebar-footer-btn {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-tertiary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--duration-fast) var(--ease-out-expo);
}
.sidebar-footer-btn:hover {
  background: var(--surface-hover);
  color: var(--text-primary);
}

/* ── Main content ── */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  position: relative;
}

/* ── Top bar ── */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.top-bar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.window-dots {
  display: flex;
  gap: 7px;
}
.window-dot {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.10);
}
.window-dot.red { background: #ef4444; border-color: #dc2626; }
.window-dot.yellow { background: #f59e0b; border-color: #d97706; }
.window-dot.green { background: #22c55e; border-color: #16a34a; }

.project-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--hairline);
  font-size: 12px;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  letter-spacing: 0.01em;
}
.project-badge .branch-icon {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--cyan-500);
  box-shadow: 0 0 6px var(--cyan-glow);
}

.top-bar-right {
  display: flex;
  align-items: center;
  gap: 6px;
}
.top-bar-btn {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-tertiary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--duration-fast) var(--ease-out-expo);
}
.top-bar-btn:hover {
  background: var(--surface-hover);
  color: var(--text-primary);
}

/* ═══════════════════════════════════════════════
   WELCOME STAGE — The Drafting Table
   ═══════════════════════════════════════════════ */

.welcome-stage {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px 60px;
  position: relative;
  z-index: 2;
}

/* Decorative schematic element behind the input */
.schematic-ring {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 420px;
  height: 420px;
  border-radius: 50%;
  border: 1px solid var(--bp-grid-accent);
  opacity: 0.5;
  pointer-events: none;
}
.schematic-ring::before {
  content: '';
  position: absolute;
  inset: 60px;
  border-radius: 50%;
  border: 1px solid var(--bp-grid-line);
}
.schematic-ring::after {
  content: '';
  position: absolute;
  inset: 140px;
  border-radius: 50%;
  border: 1px dashed rgba(0, 200, 255, 0.04);
}

/* Crosshair decoration */
.schematic-crosshair {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 280px;
  height: 280px;
  pointer-events: none;
  opacity: 0.3;
}
.schematic-crosshair::before,
.schematic-crosshair::after {
  content: '';
  position: absolute;
  background: var(--bp-grid-accent);
}
.schematic-crosshair::before {
  top: 50%;
  left: 0;
  right: 0;
  height: 1px;
  transform: translateY(-50%);
}
.schematic-crosshair::after {
  left: 50%;
  top: 0;
  bottom: 0;
  width: 1px;
  transform: translateX(-50%);
}

.welcome-container {
  position: relative;
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  width: 100%;
  max-width: 680px;
}

/* ── Welcome header with technical annotation style ── */
.welcome-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.welcome-eyebrow {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.15em;
  color: var(--text-tertiary);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 10px;
}
.welcome-eyebrow::before,
.welcome-eyebrow::after {
  content: '';
  width: 24px;
  height: 1px;
  background: var(--hairline);
}

.welcome-question {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 300;
  color: var(--text-primary);
  letter-spacing: -0.02em;
  text-align: center;
  line-height: 1.3;
}
.welcome-question em {
  font-style: normal;
  font-weight: 600;
  background: linear-gradient(135deg, var(--cyan-400), #38bdf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── Quick-action tiles ── */
.quick-actions {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  width: 100%;
}

.quick-action-tile {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 16px 12px;
  border-radius: var(--radius-md);
  border: 1px solid var(--hairline);
  background: var(--surface-input);
  cursor: pointer;
  transition: all var(--duration-normal) var(--ease-out-expo);
  text-decoration: none;
  color: inherit;
}
.quick-action-tile:hover {
  border-color: var(--border);
  background: var(--surface-hover);
  box-shadow: 0 0 20px var(--cyan-glow);
  transform: translateY(-1px);
}
.quick-action-tile .tile-icon {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.tile-icon.explore {
  background: rgba(34, 211, 238, 0.12);
  color: var(--cyan-400);
}
.tile-icon.build {
  background: rgba(167, 139, 250, 0.12);
  color: #a78bfa;
}
.tile-icon.fix {
  background: rgba(251, 146, 60, 0.12);
  color: #fb923c;
}
.tile-icon.review {
  background: rgba(74, 222, 128, 0.12);
  color: #4ade80;
}

.quick-action-tile .tile-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 0.01em;
}
.quick-action-tile .tile-hint {
  font-size: 10px;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
}

/* ── Input area — The Blueprint Drafting Surface ── */
.input-surface {
  width: 100%;
  background: var(--surface-input);
  border: 1px solid var(--hairline);
  border-radius: var(--radius-lg);
  position: relative;
  overflow: visible;
  transition: all var(--duration-normal) var(--ease-out-expo);
}
.input-surface:focus-within {
  border-color: var(--border-active);
  box-shadow: 0 0 0 3px var(--cyan-glow), var(--shadow-glow);
}

/* Measurement marks on the input corners */
.input-surface::before,
.input-surface::after {
  content: '';
  position: absolute;
  z-index: 0;
  pointer-events: none;
  opacity: 0.4;
}
.input-surface::before {
  top: -8px;
  left: 16px;
  width: 8px;
  height: 1px;
  background: var(--bp-grid-accent);
}
.input-surface::after {
  top: 16px;
  left: -8px;
  width: 1px;
  height: 8px;
  background: var(--bp-grid-accent);
}

.input-body {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 18px 20px 14px;
  min-height: 64px;
}

.input-body textarea {
  flex: 1;
  border: none;
  background: transparent;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  resize: none;
  outline: none;
  padding: 4px 0;
  min-height: 44px;
  max-height: 200px;
}
.input-body textarea::placeholder {
  color: var(--text-tertiary);
  font-weight: 300;
}

.input-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 18px 12px;
  gap: 10px;
}

.input-footer-left {
  display: flex;
  align-items: center;
  gap: 6px;
}

.input-footer-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ── Model selector chip ── */
.model-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--hairline);
  background: transparent;
  color: var(--text-tertiary);
  cursor: pointer;
  font-size: 11px;
  font-family: var(--font-mono);
  letter-spacing: 0.01em;
  transition: all var(--duration-fast) var(--ease-out-expo);
}
.model-chip:hover {
  border-color: var(--border);
  background: var(--surface-hover);
  color: var(--text-secondary);
}
.model-chip .model-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--cyan-500);
}

/* ── Mode toggle ── */
.mode-toggle {
  display: flex;
  border-radius: var(--radius-sm);
  border: 1px solid var(--hairline);
  overflow: hidden;
}
.mode-btn {
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 500;
  font-family: var(--font-mono);
  letter-spacing: 0.02em;
  border: none;
  background: transparent;
  color: var(--text-tertiary);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-out-expo);
}
.mode-btn.active {
  background: var(--surface-active);
  color: var(--text-cyan);
  border-color: var(--border);
}
.mode-btn:not(.active):hover {
  color: var(--text-secondary);
  background: var(--surface-hover);
}

/* ── Send button ── */
.send-btn {
  width: 34px;
  height: 34px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--hairline);
  background: var(--surface-input);
  color: var(--text-tertiary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--duration-fast) var(--ease-out-expo);
  font-size: 16px;
}
.send-btn:hover {
  border-color: var(--border-active);
  background: var(--surface-active);
  color: var(--text-cyan);
  box-shadow: 0 0 12px var(--cyan-glow);
}

/* ── Context bar (below input) ── */
.context-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  border-top: 1px solid var(--hairline);
  background: var(--bp-slate);
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
}

.context-bar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.context-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
}
.context-indicator .indicator-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
}
.context-indicator .indicator-dot.on { background: var(--cyan-500); box-shadow: 0 0 6px var(--cyan-glow); }
.context-indicator .indicator-dot.off { background: var(--text-tertiary); }

.context-bar-right {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-tertiary);
  letter-spacing: 0.03em;
}

/* ── Keyboard hint footer ── */
.kbd-hints {
  display: flex;
  align-items: center;
  gap: 16px;
  padding-top: 4px;
}
.kbd-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
}
.kbd-key {
  padding: 2px 6px;
  border-radius: 3px;
  border: 1px solid var(--hairline);
  background: var(--bp-elevated);
  font-size: 10px;
  color: var(--text-secondary);
  letter-spacing: 0.02em;
}

/* ═══════════════════════════════════════════════
   ANIMATIONS
   ═══════════════════════════════════════════════ */

@keyframes grid-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

@keyframes cyan-breath {
  0%, 100% { box-shadow: 0 0 0 0 var(--cyan-glow); }
  50% { box-shadow: 0 0 0 6px transparent; }
}

@keyframes rise-in {
  from {
    opacity: 0;
    transform: translateY(16px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes line-extend {
  from { transform: scaleX(0); }
  to { transform: scaleX(1); }
}

.stagger-1 { animation: rise-in 500ms var(--ease-out-expo) 100ms both; }
.stagger-2 { animation: rise-in 500ms var(--ease-out-expo) 200ms both; }
.stagger-3 { animation: rise-in 500ms var(--ease-out-expo) 300ms both; }
.stagger-4 { animation: rise-in 500ms var(--ease-out-expo) 400ms both; }

/* ═══════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════ */

@media (max-width: 768px) {
  .sidebar { display: none; }
  .quick-actions { grid-template-columns: repeat(2, 1fr); }
  .welcome-question { font-size: 22px; }
  .top-bar { padding: 10px 16px; }
  .welcome-stage { padding: 24px 16px 40px; }
  .schematic-ring { width: 280px; height: 280px; }
}
</style>
</head>
<body>

<!-- Blueprint background layer -->
<div class="blueprint-bg">
  <div class="blueprint-grid"></div>
  <div class="blueprint-vignette"></div>
  <div class="blueprint-corners"></div>
</div>

<!-- App shell -->
<div class="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="sidebar-logo">D/</div>
        <div class="sidebar-title">DCode<span>//blueprint</span></div>
      </div>
      <button class="sidebar-new-btn" title="新对话">+</button>
    </div>

    <div class="sidebar-conversations">
      <div class="conv-item active">
        <div class="conv-icon">D/</div>
        <span>新建蓝图对话</span>
      </div>
      <div class="conv-item">
        <div class="conv-icon">R/</div>
        <span>重构认证模块</span>
      </div>
      <div class="conv-item">
        <div class="conv-icon">A/</div>
        <span>API 性能分析</span>
      </div>
      <div class="conv-item">
        <div class="conv-icon">T/</div>
        <span>测试覆盖率提升</span>
      </div>
      <div class="conv-item">
        <div class="conv-icon">D/</div>
        <span>数据库迁移脚本</span>
      </div>
    </div>

    <div class="sidebar-footer">
      <button class="sidebar-footer-btn" title="设置">&#9881;</button>
      <button class="sidebar-footer-btn" title="搜索">&#8981;</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <!-- Top bar -->
    <header class="top-bar">
      <div class="top-bar-left">
        <div class="window-dots">
          <div class="window-dot red"></div>
          <div class="window-dot yellow"></div>
          <div class="window-dot green"></div>
        </div>
        <div class="project-badge">
          <span class="branch-icon"></span>
          <span>dcode-app/main</span>
        </div>
      </div>
      <div class="top-bar-right">
        <button class="top-bar-btn" title="终端">&#9000;</button>
        <button class="top-bar-btn" title="面板">&#9776;</button>
      </div>
    </header>

    <!-- Welcome stage -->
    <section class="welcome-stage">
      <!-- Schematic decorations -->
      <div class="schematic-ring"></div>
      <div class="schematic-crosshair"></div>

      <div class="welcome-container">
        <!-- Header -->
        <div class="welcome-header stagger-1">
          <div class="welcome-eyebrow">DCode Blueprint v2.0</div>
          <h1 class="welcome-question">
            今天要<em>构建</em>什么？
          </h1>
        </div>

        <!-- Quick action tiles -->
        <div class="quick-actions stagger-2">
          <button class="quick-action-tile">
            <div class="tile-icon explore">&#9679;</div>
            <span class="tile-label">探索代码</span>
            <span class="tile-hint">/explore</span>
          </button>
          <button class="quick-action-tile">
            <div class="tile-icon build">&#9670;</div>
            <span class="tile-label">构建功能</span>
            <span class="tile-hint">/build</span>
          </button>
          <button class="quick-action-tile">
            <div class="tile-icon fix">&#9650;</div>
            <span class="tile-label">修复问题</span>
            <span class="tile-hint">/fix</span>
          </button>
          <button class="quick-action-tile">
            <div class="tile-icon review">&#9632;</div>
            <span class="tile-label">代码审查</span>
            <span class="tile-hint">/review</span>
          </button>
        </div>

        <!-- Input surface -->
        <div class="input-surface stagger-3">
          <div class="input-body">
            <textarea
              rows="1"
              placeholder="描述你的工程意图，例如：为支付模块添加退款逻辑…"
              autofocus
            ></textarea>
          </div>

          <div class="input-footer">
            <div class="input-footer-left">
              <button class="model-chip">
                <span class="model-dot"></span>
                deepseek-v4
              </button>
              <div class="mode-toggle">
                <button class="mode-btn active">EXEC</button>
                <button class="mode-btn">PLAN</button>
              </div>
            </div>
            <div class="input-footer-right">
              <button class="send-btn" title="发送 (Enter)">&#8593;</button>
            </div>
          </div>

          <!-- Context bar -->
          <div class="context-bar">
            <div class="context-bar-left">
              <div class="context-indicator">
                <span class="indicator-dot on"></span>
                <span>项目已加载</span>
              </div>
              <div class="context-indicator">
                <span class="indicator-dot off"></span>
                <span>Git · main</span>
              </div>
            </div>
            <div class="context-bar-right">
              CONTEXT &bull; 0 / 128K
            </div>
          </div>
        </div>

        <!-- Keyboard hints -->
        <div class="kbd-hints stagger-4">
          <div class="kbd-item">
            <span class="kbd-key">Enter</span> 发送
          </div>
          <div class="kbd-item">
            <span class="kbd-key">Shift + Enter</span> 换行
          </div>
          <div class="kbd-item">
            <span class="kbd-key">/</span> 命令面板
          </div>
          <div class="kbd-item">
            <span class="kbd-key">Cmd + K</span> 搜索
          </div>
        </div>
      </div>
    </section>
  </main>
</div>

</body>
</html>
