name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-2022

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Electron native dependencies
        run: pnpm native:smoke

      - name: Run tests
        run: pnpm test

      - name: Build Windows package
        run: pnpm package-win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DCode-windows-x64
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: error
